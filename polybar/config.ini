include-file = ~/.config/polybar/colors.ini

[icons]
left-sep = ""
right-sep = ""
launcher = "󰟪"
chrome = ""
terminal = ""
files = ""
vscode = "󰨞"
cpu = ""
ram = ""
ethernet = "󰈁"
ethernet-disconnected = "󰈂"
wifi-0 = "󰤯"
wifi-1 = "󰤟"
wifi-2 = "󰤢"
wifi-3 = "󰤥"
wifi-4 = "󰤨"
wifi-disconnected = "󰤮"
volume-muted = "󰝟"
volume-low = "󰕿"
volume-medium = "󰖀"
volume-high = "󰕾"

[bar/main]
width = 100%
height = 28
radius = 0
wm-restack = bspwm

background = ${colors.background}
foreground = ${colors.foreground}

border-size = 0
border-color = ${colors.border}

padding-left = 0
padding-right = 0

module-margin = 0

font-0 = "JetBrainsMono Nerd Font:size=12;3"
font-1 = "JetBrainsMono Nerd Font:size=18;5"
font-2 = "Symbols Nerd Font Mono:size=15;4"
font-3 = monospace:size=12

modules-left = launcher bspwm chrome terminal files vscode
modules-center = window
modules-right = cpu memory volume network-wifi network-eth date time

enable-ipc = true

##########################
#          Left          #
##########################

[module/launcher]
type = custom/text
label = ${icons.launcher}
label-padding = 1

click-left = ~/.config/bspwm/scripts/rofi_launcher.sh
click-right = ~/.config/bspwm/scripts/rofi_powermenu.sh

format = <label>
format-foreground = ${colors.foreground}
format-background = ${colors.c6}
format-font = 3

format-suffix = ${icons.left-sep}
format-suffix-foreground = ${colors.c6}
format-suffix-background = ${colors.c5}
format-suffix-font = 2

[module/bspwm]
type = internal/bspwm

label-focused = %name%
label-focused-background = ${colors.c5}
label-focused-padding = 1

label-occupied = %name%
label-occupied-background = ${colors.c5}
label-occupied-padding = 1

label-urgent = %name%!
label-urgent-background = ${colors.c5}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.foregroundsecondary}
label-empty-background = ${colors.c5}
label-empty-padding = 1

format-suffix = ${icons.left-sep}
format-suffix-foreground = ${colors.c5}
format-suffix-background = ${colors.c4}
format-suffix-font = 2

[module/chrome]
type = custom/text
label = ${icons.chrome}
label-padding = 1
format-font = 3

click-left = google-chrome-stable &
click-right = google-chrome-stable --incognito &

format = <label>
format-foreground = ${colors.foreground}
format-background = ${colors.c4}

format-suffix = ${icons.left-sep}
format-suffix-foreground = ${colors.c4}
format-suffix-background = ${colors.c3}
format-suffix-font = 2

[module/terminal]
type = custom/text
label = ${icons.terminal}
label-padding = 1
click-left = xfce4-terminal &

format = <label>
format-foreground = ${colors.foreground}
format-background = ${colors.c3}
format-font = 3

format-suffix = ${icons.left-sep}
format-suffix-foreground = ${colors.c3}
format-suffix-background = ${colors.c2}
format-suffix-font = 2

[module/files]
type = custom/text
label = ${icons.files}
label-padding = 1
click-left = thunar &

format = <label>
format-foreground = ${colors.foreground}
format-background = ${colors.c2}
format-font = 3

format-suffix = ${icons.left-sep}
format-suffix-foreground = ${colors.c2}
format-suffix-background = ${colors.c1}
format-suffix-font = 2

[module/vscode]
type = custom/text
label = ${icons.vscode}
label-padding = 1
click-left = code &

format = <label>
format-foreground = ${colors.foreground}
format-background = ${colors.c1}
format-font = 3

format-suffix = ${icons.left-sep}
format-suffix-foreground = ${colors.c1}
format-suffix-background = ${colors.background}
format-suffix-font = 2

##########################
#         Center         #
##########################

[module/window]
type = internal/xwindow
label = %title:0:50:...%
label-foreground = ${colors.foregroundsecondary}

###########################
#          Right          #
###########################

[module/cpu]
type = internal/cpu
interval = 2
label = %percentage%%
ramp-load-0 = ${icons.cpu}
label-padding = 1
ramp-load-padding-left = 1
ramp-load-font = 3

format = <ramp-load><label>
format-background = ${colors.c1}
format-foreground = ${colors.foreground}

format-prefix = ${icons.right-sep}
format-prefix-foreground = ${colors.c1}
format-prefix-background = ${colors.background}
format-prefix-font = 2

format-suffix = ${icons.right-sep}
format-suffix-foreground = ${colors.c2}
format-suffix-background = ${colors.c1}
format-suffix-font = 2

[module/memory]
type = internal/memory
interval = 2
label = %percentage_used%%
ramp-used-0 = ${icons.ram}
label-padding = 1
ramp-used-padding-left = 1
ramp-used-font = 3

format = <ramp-used><label>
format-background = ${colors.c2}
format-foreground = ${colors.foreground}
format-suffix = ${icons.right-sep}
format-suffix-foreground = ${colors.c3}
format-suffix-background = ${colors.c2}
format-suffix-font = 2

[module/volume]
type = internal/pulseaudio
use-ui-max = true
interval = 1

label-volume = %percentage%%
label-muted = ${icons.volume-muted}
label-volume-padding = 1
label-muted-padding = 1
label-muted-font = 3
ramp-volume-0 = ${icons.volume-low}
ramp-volume-1 = ${icons.volume-medium}
ramp-volume-2 = ${icons.volume-high}
ramp-volume-padding-left = 1
ramp-volume-font = 3

click-right = pavucontrol &
scroll-up = pactl set-sink-volume @DEFAULT_SINK@ +1%
scroll-down = pactl set-sink-volume @DEFAULT_SINK@ -1%

format-volume = <ramp-volume><label-volume>
format-volume-background = ${colors.c3}
format-volume-foreground = ${colors.foreground}
format-volume-suffix = ${icons.right-sep}
format-volume-suffix-foreground = ${colors.c4}
format-volume-suffix-background = ${colors.c3}
format-volume-suffix-font = 2

format-muted = <label-muted>
format-muted-background = ${colors.c3}
format-muted-foreground = ${colors.foreground}
format-muted-suffix = ${icons.right-sep}
format-muted-suffix-foreground = ${colors.c4}
format-muted-suffix-background = ${colors.c3}
format-muted-suffix-font = 2

[module/network-wifi]
type = internal/network
interface = wlp0s20f3
interval = 3
label-connected = %essid%
label-connected-padding = 0
ramp-signal-0 = ${icons.wifi-0}
ramp-signal-1 = ${icons.wifi-1}
ramp-signal-2 = ${icons.wifi-2}
ramp-signal-3 = ${icons.wifi-3}
ramp-signal-4 = ${icons.wifi-4}
ramp-signal-font = 3
ramp-signal-padding = 1

format-connected = %{A1:nm-connection-editor &:}<ramp-signal>%{A}
format-connected-background = ${colors.c4}
format-connected-foreground = ${colors.foreground}
format-connected-suffix = ${icons.right-sep}
format-connected-suffix-foreground = ${colors.c5}
format-connected-suffix-background = ${colors.c4}
format-connected-suffix-font = 2

format-disconnected = %{A1:nm-connection-editor &:}${icons.wifi-disconnected}%{A}
format-disconnected-background = ${colors.c4}
format-disconnected-foreground = ${colors.foreground}
format-disconnected-suffix = ${icons.right-sep}
format-disconnected-suffix-foreground = ${colors.c5}
format-disconnected-suffix-background = ${colors.c4}
format-disconnected-suffix-font = 2

[module/network-eth]
type = internal/network
interface = enp0s3
interval = 3
label-connected = ${icons.ethernet}
label-connected-font = 3
label-connected-padding = 1

format-connected = %{A1:nm-connection-editor &:}<label-connected>%{A}
format-connected-background = ${colors.c4}
format-connected-foreground = ${colors.foreground}
format-connected-suffix = ${icons.right-sep}
format-connected-suffix-foreground = ${colors.c5}
format-connected-suffix-background = ${colors.c4}
format-connected-suffix-font = 2

format-disconnected = %{A1:nm-connection-editor &:}${icons.ethernet-disconnected}%{A}
format-disconnected-background = ${colors.c4}
format-disconnected-foreground = ${colors.foreground}
format-disconnected-suffix = ${icons.right-sep}
format-disconnected-suffix-foreground = ${colors.c5}
format-disconnected-suffix-background = ${colors.c4}
format-disconnected-suffix-font = 2

[module/date]
type = custom/script
exec = date +"%-m/%-d/%Y"
interval = 1
label = %output%
label-padding = 1

format-background = ${colors.c5}
format-foreground = ${colors.foreground}
format-suffix = ${icons.right-sep}
format-suffix-foreground = ${colors.c6}
format-suffix-background = ${colors.c5}
format-suffix-font = 2

[module/time]
type = custom/script
exec = date +"%-I:%M %p"
interval = 1
label = %output%
label-padding = 1

format-background = ${colors.c6}
format-foreground = ${colors.foreground}
