#################################
# picom v13 config for bspwm
# Uses upstream rules and animation presets.
#################################

#################################
# Backend / timing
#################################
backend = "glx";
vsync = false;
use-damage = true;
crop-shadow-to-monitor = true;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
detect-client-leader = true;
use-ewmh-active-win = true;
unredir-if-possible = true;

#################################
# Global look
#################################
shadow = true;
shadow-radius = 18;
shadow-offset-x = -10;
shadow-offset-y = -10;
shadow-opacity = 0.3;
shadow-color = "#000000";

fading = true;
fade-delta = 5;
fade-in-step = 0.03;
fade-out-step = 0.03;

#################################
# Inactive window opacity / blur
#################################
blur-method = "dual_kawase";
blur-strength = 3;
blur-background = false;
blur-background-frame = true;
blur-background-fixed = true;

#################################
# Window rules
#################################
rules = (
  # Focused windows stay fully opaque and don't blur the background.
  {
    match = "(window_type = 'normal' || window_type = 'dialog' || window_type = 'utility' || window_type = 'splash') && !fullscreen && (focused || group_focused)";
    opacity = 1.0;
    opacity-override = true;
    blur-background = false;
  },

  # Unfocused windows become semi-transparent and blur what is behind them.
  {
    match = "(window_type = 'normal' || window_type = 'dialog' || window_type = 'utility' || window_type = 'splash') && !fullscreen && !(focused || group_focused)";
    opacity = 0.8;
    opacity-override = true;
    blur-background = true;
  },

  # Keep desktop elements clean.
  {
    match = "window_type = 'desktop'";
    shadow = false;
    fade = false;
    corner-radius = 0;
  },
  {
    match = "window_type = 'dock' || class_g = 'Polybar'";
    shadow = false;
    fade = false;
    corner-radius = 0;
    clip-shadow-above = true;
  },

  # Menus and drag handles should stay snappy and unobtrusive.
  {
    match = "window_type = 'tooltip' || window_type = 'dnd'";
    shadow = false;
    blur-background = false;
    corner-radius = 10;
  },
  {
    match = "window_type = 'popup_menu' || window_type = 'dropdown_menu' || window_type = 'menu'";
    shadow = false;
    full-shadow = false;
    blur-background = false;
    corner-radius = 10;
  },

  # Normal bspwm windows: subtle open/close and fast reflow motion.
  {
    match = "window_type = 'normal' && !fullscreen";
    corner-radius = 10;
    animations = (
      {
        triggers = [ "open", "show" ];
        preset = "appear";
        scale = 0.9;
        duration = 0.15;
        suppressions = [ "close", "hide", "geometry" ];
      },
      {
        triggers = [ "close", "hide" ];
        preset = "disappear";
        scale = 0.9;
        duration = 0.15;
        suppressions = [ "open", "show", "geometry" ];
      },
      # Upstream marks geometry-change as experimental, so keep it short.
      {
        triggers = [ "geometry" ];
        preset = "geometry-change";
        duration = 0.15;
        suppressions = [ "open", "show", "close", "hide" ];
      }
    );
  },

  # Floating dialogs can be a little more expressive.
  {
    match = "(window_type = 'dialog' || window_type = 'utility' || window_type = 'splash') && !fullscreen";
    corner-radius = 10;
    animations = (
      {
        triggers = [ "open", "show" ];
        preset = "appear";
        scale = 0.9;
        duration = 0.15;
      },
      {
        triggers = [ "close", "hide" ];
        preset = "disappear";
        scale = 0.9;
        duration = 0.15;
      }
    );
  },

  # Rofi pairs well with a light blur and a quick pop animation.
  {
    match = "class_g = 'Rofi'";
    opacity = 1.0;
    blur-background = false;
    corner-radius = 10;
    shadow = true;
    animations = (
      {
        triggers = [ "open", "show" ];
        preset = "appear";
        scale = 0.9;
        duration = 0.15;
      },
      {
        triggers = [ "close", "hide" ];
        preset = "disappear";
        scale = 0.9;
        duration = 0.15;
      }
    );
  },

  # Notifications look nice sliding in from the edge.
  {
    match = "window_type = 'notification'";
    blur-background = true;
    corner-radius = 10;
    animations = (
      {
        triggers = [ "open", "show" ];
        preset = "fly-in";
        direction = "right";
        duration = 0.15;
      },
      {
        triggers = [ "close", "hide" ];
        preset = "fly-out";
        direction = "right";
        duration = 0.15;
      }
    );
  },

  # Fullscreen windows should stay edge-to-edge and as fast as possible.
  {
    match = "fullscreen";
    corner-radius = 0;
    shadow = true;
    unredir = true;
    clip-shadow-above = true;
  }
);
